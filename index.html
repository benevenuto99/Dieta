<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Dieta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        /* Diet */
        .meal-block { border-left: 4px solid var(--primary); margin-bottom: 20px; padding-left: 10px; background: white; padding: 10px; border-radius: 8px; }
        .meal-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .meal-item.done { opacity: 0.5; text-decoration: line-through; }

        /* Peso & Histórico */
        .weight-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .last-weight-display { font-size: 2.2rem; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .history-info { display: flex; flex-direction: column; }
        .history-date { font-size: 12px; color: #7f8c8d; }
        .btn-delete { color: var(--danger); cursor: pointer; padding: 5px; font-size: 18px; }

        /* Nav */
        .nav-tabs { display: flex; justify-content: space-around; background: white; padding: 12px 0; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { color: #95a5a6; text-align: center; font-size: 12px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }

        .view { display: none; }
        .view.active { display: block; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        label { font-size: 12px; font-weight: bold; color: var(--dark); display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header"><h3>MINHA DIETA</h3></div>

<div class="container">
    <div id="view-diet" class="view active">
        <div id="setup-view">
            <div class="card">
                <h4>Importar Dieta</h4>
                <input type="file" id="pdfInput" accept="application/pdf" style="margin-bottom: 10px;">
                <textarea id="rawText" placeholder="Cole o texto aqui..." style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
                <button class="btn" onclick="processDiet()">Analisar</button>
            </div>
        </div>
        <div id="diet-display"></div>
    </div>

    <div id="view-weight" class="view">
        <div class="card">
            <h4>Último Peso</h4>
            <div class="last-weight-display"><span id="displayPeso">--</span> kg</div>
            <p id="metaDestaque" style="text-align: center; font-size: 13px; color: #7f8c8d; margin: 0;"></p>
        </div>

        <div class="card">
            <h4>Novo Registro</h4>
            <div class="weight-row">
                <div style="flex: 2;">
                    <label>Peso (kg)</label>
                    <input type="number" id="inputPeso" step="0.1" placeholder="85.0">
                </div>
                <div style="flex: 3;">
                    <label>Data</label>
                    <input type="date" id="inputData">
                </div>
            </div>
            
            <details style="margin: 10px 0; color: #3498db; cursor: pointer;">
                <summary style="font-size: 13px;">Definir Meta de Peso</summary>
                <input type="number" id="inputMeta" step="0.1" placeholder="Ex: 75.0" style="margin-top:5px;">
            </details>
            
            <button class="btn" onclick="salvarPeso()">Salvar no Histórico</button>
        </div>

        <div class="card">
            <h4>Histórico</h4>
            <div id="historicoPeso"></div>
        </div>
    </div>
</div>

<nav class="nav-tabs">
    <div class="nav-item active" onclick="trocarAba('view-diet', this)"><i class="fas fa-clipboard-check"></i>Dieta</div>
    <div class="nav-item" onclick="trocarAba('view-weight', this)"><i class="fas fa-weight"></i>Peso</div>
</nav>

<script>
    let appData = JSON.parse(localStorage.getItem('felipeData')) || { dieta: [], historicoPeso: [], meta: 0 };

    window.onload = () => {
        // Define data de hoje no input por padrão
        document.getElementById('inputData').valueAsDate = new Date();
        carregarTudo();
    };

    function carregarTudo() {
        if(appData.dieta.length > 0) {
            document.getElementById('setup-view').style.display = 'none';
            renderDieta();
        }
        renderPeso();
    }

    // --- LÓGICA DE PESO ---
    function salvarPeso() {
        const peso = parseFloat(document.getElementById('inputPeso').value);
        const dataInput = document.getElementById('inputData').value;
        const meta = parseFloat(document.getElementById('inputMeta').value);

        if (peso && dataInput) {
            // Converte data para formato legível e timestamp para ordenação
            const dataObj = new Date(dataInput + 'T12:00:00'); 
            const formattedDate = dataObj.toLocaleDateString('pt-BR');
            
            appData.historicoPeso.push({ 
                id: Date.now(), 
                timestamp: dataObj.getTime(),
                data: formattedDate, 
                peso: peso 
            });

            // Ordena por data (mais novo primeiro)
            appData.historicoPeso.sort((a, b) => b.timestamp - a.timestamp);
        }

        if (meta) appData.meta = meta;

        salvarDB();
        renderPeso();
        document.getElementById('inputPeso').value = "";
    }

    function deletarPeso(id) {
        if(confirm("Deseja apagar este registro?")) {
            appData.historicoPeso = appData.historicoPeso.filter(p => p.id !== id);
            salvarDB();
            renderPeso();
        }
    }

    function renderPeso() {
        const lista = document.getElementById('historicoPeso');
        const display = document.getElementById('displayPeso');
        const metaDestaque = document.getElementById('metaDestaque');
        
        lista.innerHTML = "";
        
        if(appData.historicoPeso.length > 0) {
            const maisRecente = appData.historicoPeso[0];
            display.innerText = maisRecente.peso;
            
            appData.historicoPeso.forEach(reg => {
                lista.innerHTML += `
                    <div class="history-item">
                        <div class="history-info">
                            <strong>${reg.peso} kg</strong>
                            <span class="history-date">${reg.data}</span>
                        </div>
                        <i class="fas fa-trash-alt btn-delete" onclick="deletarPeso(${reg.id})"></i>
                    </div>`;
            });

            if(appData.meta > 0) {
                const diff = (maisRecente.peso - appData.meta).toFixed(1);
                metaDestaque.innerText = diff > 0 ? `Faltam ${diff}kg para a meta (${appData.meta}kg)` : "Meta atingida! 🔥";
            }
        } else {
            display.innerText = "--";
            metaDestaque.innerText = "";
        }
    }

    // --- LÓGICA DE DIETA (IGUAL ANTERIOR) ---
    function processDiet() {
        let text = document.getElementById('rawText').value;
        let parts = text.split(/(Refeição \d+|Café|Almoço|Lanche|Jantar|Ceia|\d{2}:\d{2})/gi);
        let structured = [];
        for(let i = 1; i < parts.length; i+=2) {
            let title = parts[i].trim();
            let content = parts[i+1] ? parts[i+1].trim() : "";
            if(content) {
                let items = content.split('\n').filter(l => l.trim().length > 3);
                structured.push({ title, items: items.map(t => ({ text: t.trim(), done: false, kcal: 0 })) });
            }
        }
        appData.dieta = structured;
        salvarDB();
        location.reload();
    }

    function renderDieta() {
        const area = document.getElementById('diet-display');
        area.innerHTML = "<h4>Sua Dieta</h4>";
        appData.dieta.forEach((m, mIdx) => {
            let html = `<div class="meal-block"><strong>${m.title}</strong>`;
            m.items.forEach((it, iIdx) => {
                html += `
                    <div class="meal-item ${it.done ? 'done' : ''}" onclick="toggleMeal(${mIdx}, ${iIdx})">
                        <span><input type="checkbox" ${it.done ? 'checked' : ''}> ${it.text}</span>
                    </div>`;
            });
            area.innerHTML += html + `</div>`;
        });
        area.innerHTML += `<button class="btn" style="background:#2c3e50; margin-top:20px;" onclick="if(confirm('Limpar dieta?')){localStorage.clear(); location.reload();}">Trocar Dieta</button>`;
    }

    function toggleMeal(mIdx, iIdx) {
        appData.dieta[mIdx].items[iIdx].done = !appData.dieta[mIdx].items[iIdx].done;
        salvarDB();
        renderDieta();
    }

    function trocarAba(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function salvarDB() { localStorage.setItem('felipeData', JSON.stringify(appData)); }

    // PDF Import
    document.getElementById('pdfInput').onchange = async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(s => s.str).join(" ") + "\n";
            }
            document.getElementById('rawText').value = fullText;
        };
        reader.readAsArrayBuffer(file);
    };
</script>
</body>
</html>
